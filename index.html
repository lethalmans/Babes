<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Прости, солнышко...</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #2a1b3d, #4a2c5f, #6b3a6e);
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      touch-action: manipulation;
    }

    .hearts {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      overflow: hidden;
    }
    .heart-bg {
      position: absolute;
      font-size: 26px;
      color: #ff99cc;
      opacity: 0.17;
      animation: floatHeart 17s linear infinite;
    }
    @keyframes floatHeart {
      0% { transform: translateY(120vh) rotate(0deg); }
      100% { transform: translateY(-150px) rotate(360deg); }
    }

    .heart-wrapper {
      position: relative;
      width: 220px;
      height: 200px;
      margin-bottom: 40px;
      cursor: pointer;
    }

    .heart {
      width: 220px;
      height: 200px;
      position: relative;
      animation: brokenShake 0.8s infinite alternate ease-in-out;
    }
    .heart::before,
    .heart::after {
      content: "";
      position: absolute;
      width: 110px;
      height: 165px;
      background: #ff6b9d;
      top: 0;
      border-radius: 110px 110px 0 0;
      box-shadow: 0 0 40px rgba(255, 107, 157, 0.8);
    }
    .heart::before { left: 110px; transform: rotate(-45deg); transform-origin: 0 100%; }
    .heart::after  { left: 0;    transform: rotate(45deg);  transform-origin: 100% 100%; }

    /* Большая трещина разбитого сердца */
    .crack {
      position: absolute;
      inset: 0;
      background: linear-gradient(transparent, rgba(255,255,255,0.95) 50%, transparent);
      transform: rotate(36deg);
      opacity: 0.95;
      z-index: 3;
      transition: opacity 3.2s ease-out;
    }

    .glow {
      position: absolute;
      inset: -90px;
      background: radial-gradient(circle, #ffccdd 15%, #ff8ab3 45%, transparent 80%);
      border-radius: 50%;
      opacity: 0;
      z-index: 1;
      transition: all 4s ease;
    }

    .progress-text {
      font-size: 1.4em;
      color: #ffe6cc;
      margin-top: 10px;
      min-height: 60px;
      text-align: center;
    }

    .message {
      font-size: 2.35em;
      font-weight: 300;
      text-align: center;
      line-height: 1.35;
      max-width: 90%;
      opacity: 0;
      transition: opacity 3s ease;
      text-shadow: 0 0 28px rgba(255, 107, 157, 0.9);
    }

    @keyframes brokenShake {
      0% { transform: scale(1) rotate(-4deg); }
      100% { transform: scale(1) rotate(4deg); }
    }
  </style>
</head>
<body>

  <div class="hearts" id="hearts"></div>

  <div class="heart-wrapper" id="heartWrapper">
    <div class="heart" id="heart">
      <div class="crack" id="crack"></div>
      <div class="glow" id="glow"></div>
    </div>
  </div>

  <div class="progress-text" id="progress">Тапай по сердцу, чтобы собрать его...</div>
  <div class="message" id="message"></div>

  <script>
    const wrapper = document.getElementById('heartWrapper');
    const heart = document.getElementById('heart');
    const crack = document.getElementById('crack');
    const glow = document.getElementById('glow');
    const progress = document.getElementById('progress');
    const messageEl = document.getElementById('message');

    let step = 0;

    const steps = [
      { progress: "Шаг 1 из 4", text: "Солнышко, я был 😔" },
      { progress: "Шаг 2 из 4", text: "неправ в том, что нагрубил тебе 😞" },
      { progress: "Шаг 3 из 4", text: "И я виноват перед тобой 😔" },
      { progress: "❤️ Сердце собрано", text: "Прости меня пожалуйста, малыш ❤️" }
    ];

    function nextStep() {
      if (step >= 4) return;
      step++;
      const current = steps[step-1];

      progress.textContent = current.progress;
      messageEl.innerHTML = current.text;
      messageEl.style.opacity = '1';

      // Уменьшаем трещину постепенно
      crack.style.opacity = 0.95 - (step * 0.3);

      if (step === 4) {
        heart.style.animation = 'none'; // убираем тряску
        crack.style.opacity = '0';
        glow.style.opacity = '0.98';
        glow.style.transform = 'scale(2.4)';

        // Вау-взрыв сердечек
        const bg = document.getElementById('hearts');
        for (let i = 0; i < 60; i++) {
          const h = document.createElement('div');
          h.className = 'heart-bg';
          h.textContent = ['💗','💖','❤️','✨'][Math.floor(Math.random()*4)];
          h.style.left = Math.random() * 100 + '%';
          h.style.animationDuration = (3 + Math.random() * 6) + 's';
          bg.appendChild(h);
          setTimeout(() => h.remove(), 9000);
        }
      }
    }

    wrapper.addEventListener('click', nextStep);
    wrapper.addEventListener('touchstart', (e) => {
      e.preventDefault();
      nextStep();
    }, { passive: false });

    // Начальные парящие сердечки
    const bgContainer = document.getElementById('hearts');
    for (let i = 0; i < 20; i++) {
      const h = document.createElement('div');
      h.className = 'heart-bg';
      h.textContent = '💗';
      h.style.left = Math.random() * 100 + '%';
      h.style.animationDuration = (14 + Math.random() * 20) + 's';
      h.style.animationDelay = '-' + (Math.random() * 28) + 's';
      bgContainer.appendChild(h);
    }
  </script>
</body>
</html>
