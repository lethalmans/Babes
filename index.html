<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Прости...</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #0a0015;
      color: #fff;
      font-family: -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .heart {
      width: 160px;
      height: 160px;
      position: relative;
      cursor: pointer;
      margin-bottom: 50px;
      transition: all 1.5s ease;
    }
    .heart::before, .heart::after {
      content: "";
      width: 80px;
      height: 120px;
      background: #ff4d6d;
      position: absolute;
      top: 0;
      left: 80px;
      border-radius: 80px 80px 0 0;
      transform: rotate(-45deg);
      transform-origin: 0 100%;
    }
    .heart::after {
      left: 0;
      transform: rotate(45deg);
    }
    .crack {
      position: absolute;
      inset: 0;
      background: linear-gradient(transparent, #fff 50%, transparent);
      opacity: 0.7;
      transform: rotate(30deg);
      transition: opacity 2s;
    }
    .glow {
      position: absolute;
      inset: -30px;
      background: radial-gradient(circle, #ffd700 10%, transparent 70%);
      opacity: 0;
      border-radius: 50%;
      transition: opacity 2s, transform 3s;
    }
    .message {
      font-size: 2.5em;
      opacity: 0;
      text-shadow: 0 0 20px #ff4d6d;
      transition: opacity 2s 1s;
      font-weight: 300;
      letter-spacing: -1px;
    }
    .sub {
      font-size: 1.3em;
      opacity: 0;
      margin-top: 20px;
      color: #ffd700;
      transition: opacity 2s 2s;
    }
    .tapped .crack { opacity: 0; }
    .tapped .glow { opacity: 1; transform: scale(1.8); }
    .tapped .message { opacity: 1; }
    .tapped .sub { opacity: 1; }
  </style>
</head>
<body>
  <div class="heart" onclick="this.classList.add('tapped')">
    <div class="crack"></div>
    <div class="glow"></div>
  </div>

  <div class="message">Прости меня, что нагрубил, солнышко</div>
</body>
</html>
