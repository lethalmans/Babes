<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Прости, солнышко...</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #2a1b3d, #4a2c5f, #6b3a6e);
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      touch-action: manipulation;
    }

    .hearts {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      overflow: hidden;
    }
    .heart-bg {
      position: absolute;
      font-size: 26px;
      color: #ff99cc;
      opacity: 0.17;
      animation: floatHeart 17s linear infinite;
    }
    @keyframes floatHeart {
      0% { transform: translateY(120vh) rotate(0deg); }
      100% { transform: translateY(-150px) rotate(360deg); }
    }

    .heart-wrapper {
      position: relative;
      width: 220px;
      height: 200px;
      margin-bottom: 40px;
      cursor: pointer;
    }

    .heart {
      width: 220px;
      height: 200px;
      position: relative;
      /* Изначальная тряска разбитого сердца */
      animation: brokenShake 0.8s infinite alternate ease-in-out;
    }

    /* Общие стили половинок */
    .heart::before,
    .heart::after {
      content: "";
      position: absolute;
      width: 110px;
      height: 165px;
      background: #ff6b9d;
      top: 0;
      border-radius: 110px 110px 0 0;
      box-shadow: 0 0 30px rgba(255, 107, 157, 0.4);
      transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* Плавная сборка */
    }

    /* Левая половинка: изначально сдвинута влево и повернута */
    .heart::after { 
      left: 0; 
      transform: rotate(35deg) translate(-40px, -20px); 
      transform-origin: 100% 100%; 
    }

    /* Правая половинка: изначально сдвинута вправо и повернута */
    .heart::before { 
      left: 110px; 
      transform: rotate(-35deg) translate(40px, -20px); 
      transform-origin: 0 100%; 
    }

    /* Классы для состояний сборки (управляются через JS) */
    .step-1::after { transform: rotate(40deg) translate(-25px, -10px); }
    .step-1::before { transform: rotate(-40deg) translate(25px, -10px); }

    .step-2::after { transform: rotate(45deg) translate(-15px, -5px); }
    .step-2::before { transform: rotate(-45deg) translate(15px, -5px); }

    .step-3::after { transform: rotate(45deg) translate(-5px, 0); }
    .step-3::before { transform: rotate(-45deg) translate(5px, 0); }

    /* Финальное собранное состояние */
    .step-4::after { transform: rotate(45deg) translate(0, 0); }
    .step-4::before { transform: rotate(-45deg) translate(0, 0); }

    .crack {
      position: absolute;
      left: 50%;
      top: 10%;
      width: 4px;
      height: 80%;
      background: rgba(42, 27, 61, 0.6);
      transform: translateX(-50%) rotate(5deg);
      z-index: 5;
      transition: opacity 0.5s;
    }

    .glow {
      position: absolute;
      inset: -90px;
      background: radial-gradient(circle, #ffccdd 15%, #ff8ab3 45%, transparent 80%);
      border-radius: 50%;
      opacity: 0;
      z-index: -1;
      transition: all 2s ease;
    }

    .progress-text {
      font-size: 1.2em;
      color: #ffe6cc;
      margin-top: 10px;
      min-height: 30px;
      text-align: center;
      opacity: 0.8;
    }

    .message {
      font-size: 1.8em;
      font-weight: 300;
      text-align: center;
      line-height: 1.35;
      max-width: 90%;
      opacity: 0;
      transition: opacity 0.8s ease;
      text-shadow: 0 0 20px rgba(255, 107, 157, 0.6);
      margin-top: 20px;
    }

    @keyframes brokenShake {
      0% { transform: scale(1) rotate(-2deg); }
      100% { transform: scale(1) rotate(2deg); }
    }
  </style>
</head>
<body>

  <div class="hearts" id="hearts"></div>

  <div class="heart-wrapper" id="heartWrapper">
    <div class="heart" id="heart">
      <div class="crack" id="crack"></div>
      <div class="glow" id="glow"></div>
    </div>
  </div>

  <div class="progress-text" id="progress">Тапни, чтобы начать всё исправлять...</div>
  <div class="message" id="message"></div>

  <script>
    const wrapper = document.getElementById('heartWrapper');
    const heart = document.getElementById('heart');
    const crack = document.getElementById('crack');
    const glow = document.getElementById('glow');
    const progress = document.getElementById('progress');
    const messageEl = document.getElementById('message');

    let step = 0;

    const steps = [
      { progress: "Шаг 1 из 4", text: "Солнышко, я был очень 😔" },
      { progress: "Шаг 2 из 4", text: "неправ, когда нагрубил тебе 😞" },
      { progress: "Шаг 3 из 4", text: "Я действительно виноват 😔" },
      { progress: "❤️ Сердце целое", text: "Прости меня, пожалуйста, малыш ❤️" }
    ];

    function nextStep() {
      if (step >= 4) return;
      step++;
      
      const current = steps[step-1];

      // Добавляем класс шага для анимации половинок
      heart.classList.remove('step-1', 'step-2', 'step-3', 'step-4');
      heart.classList.add(`step-${step}`);

      progress.textContent = current.progress;
      messageEl.innerHTML = current.text;
      messageEl.style.opacity = '1';

      if (step === 4) {
        heart.style.animation = 'none'; 
        crack.style.opacity = '0';
        glow.style.opacity = '0.8';
        glow.style.transform = 'scale(1.8)';

        // Праздничный взрыв сердечек
        const bg = document.getElementById('hearts');
        for (let i = 0; i < 50; i++) {
          setTimeout(() => {
            const h = document.createElement('div');
            h.className = 'heart-bg';
            h.textContent = ['💗','💖','❤️','✨'][Math.floor(Math.random()*4)];
            h.style.left = Math.random() * 100 + '%';
            h.style.fontSize = (Math.random() * 20 + 20) + 'px';
            h.style.animationDuration = (3 + Math.random() * 5) + 's';
            bg.appendChild(h);
            setTimeout(() => h.remove(), 5000);
          }, i * 50);
        }
      }
    }

    wrapper.addEventListener('click', nextStep);
    wrapper.addEventListener('touchstart', (e) => {
      e.preventDefault();
      nextStep();
    }, { passive: false });

    // Фон
    const bgContainer = document.getElementById('hearts');
    for (let i = 0; i < 15; i++) {
      const h = document.createElement('div');
      h.className = 'heart-bg';
      h.textContent = '💗';
      h.style.left = Math.random() * 100 + '%';
      h.style.animationDuration = (10 + Math.random() * 15) + 's';
      h.style.animationDelay = '-' + (Math.random() * 20) + 's';
      bgContainer.appendChild(h);
    }
  </script>
</body>
</html>
